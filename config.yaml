data:
  start: '2016-05-18'
  end: '2026-05-15'
  splits:
    train:
      start: '2016-05-18'
      end: '2024-05-15'      # 前 8 年
    embargo:
      days: 10                 # 隔离带：train 和 test 之间空出来不用
    test:
      start: '2024-05-24'    # = train.end + 6 个交易日，不是紧接着
      end: '2026-05-15'      # 后 2 年
model:
  objective: regression
  num_leaves: 31
  learning_rate: 0.05
  n_estimators: 100
  feature_fraction: 0.9
  bagging_fraction: 0.8
  bagging_freq: 5
  verbose: -1
